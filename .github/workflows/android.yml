name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # تحديث للإصدار الرابع

    - name: set up JDK 17
      uses: actions/setup-java@v4 # تحديث للإصدار الرابع
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # هذا هو التحديث المطلوب لحل مشكلة الـ Deprecation
      with:
        name: calculator-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk